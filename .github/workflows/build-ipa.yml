name: Build IPA
on:
  workflow_dispatch:
jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install dependencies
        run: npm install
      - name: Install Capacitor
        run: npm install -g @capacitor/cli @capacitor/core @capacitor/ios
      - name: Add iOS
        run: npx cap add ios || true
      - name: Sync
        run: npx cap sync ios
      - name: Pod install
        run: cd ios/App && pod install
      - name: Build IPA with proper packaging
        run: |
          cd ios/App
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -sdk iphoneos \
            -configuration Release \
            -archivePath ../../build/App.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
          mkdir -p ../../build/IPA/Payload
          cp -r ../../build/App.xcarchive/Products/Applications/App.app ../../build/IPA/Payload/
          cd ../../build/IPA
          zip -r OpenClaw.ipa Payload/
      - uses: actions/upload-artifact@v4
        with:
          name: OpenClaw-IPA
          path: build/IPA/OpenClaw.ipa
          retention-days: 30
