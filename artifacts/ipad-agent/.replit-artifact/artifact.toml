kind = "web"
previewPath = "/"
title = "iPad AI Agent"
version = "1.0.0"
id = "artifacts/ipad-agent"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 24183
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/ipad-agent run dev"

[services.env]
PORT = "24183"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/ipad-agent", "run", "build"]
publicDir = "artifacts/ipad-agent/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
